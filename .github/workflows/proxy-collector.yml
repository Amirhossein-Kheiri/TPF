name: Update Proxy List

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download proxy list
        run: |
          curl -L -o proxy_ru.txt https://raw.githubusercontent.com/kort0881/telegram-proxy-collector/main/proxy_ru.txt
          curl -L -o proxy_all.txt https://raw.githubusercontent.com/kort0881/telegram-proxy-collector/main/proxy_all.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxy_ru.txt proxy_all.txt
          git diff --staged --quiet || git commit -m "Update proxies $(date -u)"
          git push
